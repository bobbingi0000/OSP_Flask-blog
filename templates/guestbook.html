{% extends "base.html" %}

{% block content %}
<div class="desktop" style="grid-template-columns: 1fr; max-width: 900px;">
    <div class="os-window">
        <div class="os-window-header">
            <span class="os-window-title">GUESTBOOK.LOG</span>
            <span class="os-window-controls">
                <span class="control-btn">_</span>
                <span class="control-btn">ㅁ</span>
                <span class="control-btn">X</span>
            </span>
        </div>
        <div class="os-window-content">
            <div style="display: flex; gap: 20px; align-items: flex-start;">
                <!-- Left Nav for back button -->
                <div style="width: 200px; border-right: 1px dashed #00f3ff; padding-right: 20px;">
                    <div class="nav-list">
                        <a href="{{ url_for('home') }}">[0] RETURN_HOME</a>
                    </div>

                    <div style="margin-top: 30px;">
                        <span style="color: #5a7e91; display: block; margin-bottom: 5px;">STATUS:</span>
                        <span style="color: #39ff14; text-shadow: 0 0 5px #39ff14;">ACCEPTING CONNECTIONS...</span>
                    </div>
                </div>

                <!-- Right content -->
                <div style="flex-grow: 1;">
                    <h3 style="color: #00f3ff; margin-top: 0; text-shadow: 0 0 5px #00f3ff;">>>> Leave a Trace</h3>
                    <form action="{{ url_for('guestbook') }}" method="post"
                        style="display: flex; gap: 10px; margin-bottom: 30px;">
                        <input type="text" name="author" placeholder="Visitor_Name" style="flex: 1;" required maxlength="50">
                        <input type="text" name="content" placeholder="Drop a line..." style="flex: 3;" required maxlength="500">
                        <button type="submit" style="background: #0c151c; color: #00f3ff; border: 1px solid #00f3ff; box-shadow: inset 0 0 5px #00f3ff;">SIGN_LOG</button>
                    </form>

                    <hr style="border: 0; border-bottom: 1px dashed rgba(0, 243, 255, 0.5); margin-bottom: 20px;">

                    {% for entry in entries %}
                    <div class="log-entry">
                        <span style="color: #00f3ff; font-weight: bold; text-shadow: 0 0 5px #00f3ff;">[{{ entry.author }}]</span>:
                        <span style="color: #5a7e91;">{{ entry.content }}</span>
                        <div style="font-size: 0.8em; color: #39ff14; margin-top: 5px; opacity: 0.8;">TIME: {{ entry.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
